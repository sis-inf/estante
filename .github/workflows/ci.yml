name: CI

on:
  pull_request:
    branches: [dev, main]

jobs:
  validar-pr:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        java-version: [17, 21]
    steps:
      - name: Verificar descripción del PR
        shell: bash
        run: |
          if [ -z "${{ github.event.pull_request.body }}" ]; then
            echo "El PR debe tener descripción"
            exit 1
          fi
          echo "✅ PR tiene descripción"

      - name: Verificar que referencia un issue
        shell: bash
        run: |
          if ! echo "${{ github.event.pull_request.body }}" | grep -qi "closes #\|fixes #\|refs #"; then
            echo "El PR debe referenciar un issue con 'Closes #N'"
            exit 1
          fi
          echo "✅ PR referencia un issue"

      - name: Checkout del repositorio
        uses: actions/checkout@v4
        
      - name: Verificar actualización de CHANGELOG.md
        if: "!contains(github.event.pull_request.labels.*.name, 'skip-changelog')"
        run: |
          git fetch origin ${{ github.base_ref }}

          archivos=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)

          if echo "$archivos" | grep -q "^src/main/java/"; then
            if ! echo "$archivos" | grep -q "^CHANGELOG.md$"; then
              echo "El PR modifica src/main/java pero no actualiza CHANGELOG.md"
              echo "Agrega el cambio al CHANGELOG.md o usa la etiqueta skip-changelog si corresponde"
              exit 1
            fi
          fi

          echo "✅ Verificación de CHANGELOG.md correcta"
      - name: Verificar estructura Maven
        run: bash scripts/verificar_estructura.sh

      - name: Configurar Java JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Run JUnit Tests
        run: mvn test --no-transfer-progress

      - name: Verify build without integration tests
        run: mvn -B verify -DskipITs

      - name: Generar reporte JaCoCo
        run: mvn jacoco:report --no-transfer-progress

      - name: Checkstyle
        run: mvn checkstyle:check --no-transfer-progress

      - name: Subir reporte Checkstyle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-report-java-${{ matrix.java-version }}-${{ matrix.os }}
          path: target/checkstyle-result.xml
          if-no-files-found: ignore

      - name: Subir reporte JaCoCo
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-${{ matrix.java-version }}-${{ matrix.os }}
          path: target/site/jacoco/
          if-no-files-found: ignore
