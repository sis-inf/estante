version: 2

updates:

* package-ecosystem: "maven"
  directory: "/"
  schedule:
  interval: "monthly"
  target-branch: "dev"
  open-pull-requests-limit: 3
  commit-message:
  prefix: "chore(deps)"

* package-ecosystem: "github-actions"
  directory: "/"
  schedule:
  interval: "monthly"
  target-branch: "dev"
  open-pull-requests-limit: 3
  commit-message:
  prefix: "chore(deps)"
